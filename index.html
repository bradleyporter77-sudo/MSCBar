        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:10px;">

          <button class="qb" style="width:34px;height:34px;font-size:18px;border:1px solid var(--bd);" data-a="botUp" data-grp="${g}">+</button>
          <button style="background:var(--hv);color:var(--gd);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;font-size:13px;font-family:Georgia,serif;cursor:pointer;" data-a="botSet" data-grp="${g}" data-name="${esc(name)}">Set Tots</button>
        </div>
        <div style="margin-top:10px;">${skuRows}</div>
      </div>`;
    }).join("");
    return header+cards+`<button class="add-pbtn" data-a="newP">+ Add New Product</button>`;
  }

  // OTHER CATEGORIES — standard per-unit stock
  const ps=(cgrp[S.adminProdCat]||[]).sort((a,b)=>a.n.localeCompare(b.n));
  const rows=ps.map(p=>{
    const stk=p.stock||0;
    const sc=stk<=0?"var(--dn)":stk<=5?"var(--gd)":"var(--gn)";
    const sl=stk<=0?"OUT":"x"+stk;

async function doLPnk(v){
  if(v==="DEL"){set({pinInput:S.pinInput.slice(0,-1),loginErr:false});return;}
  if(v==="OK"){
    try{const vol=await loginByPin(S.pinInput);if(vol){const pr=await loadProds().catch(()=>S.products);const ss=await loadSpiritStock().catch(()=>({}));set({vol:vol.name,volId:vol.id,screen:"menu",pinInput:"",loginErr:false,products:pr,spiritStock:ss,order:[],cat:"beer"});}else set({loginErr:true,pinInput:""});}
    catch(e){console.error("Login error:",e);set({loginErr:true,pinInput:""});}
    return;
  }
  if(S.pinInput.length>=4)return;
  const next=S.pinInput+v;set({pinInput:next,loginErr:false});
  if(next.length===4){
    try{const vol=await loginByPin(next);if(vol){const pr=await loadProds().catch(()=>S.products);const ss=await loadSpiritStock().catch(()=>({}));setTimeout(()=>{set({vol:vol.name,volId:vol.id,screen:"menu",pinInput:"",loginErr:false,products:pr,spiritStock:ss,order:[],cat:"beer"});addLog("👤",vol.name,"Logged in");history.pushState({loggedIn:true},'');},100);}else setTimeout(()=>set({loginErr:true,pinInput:""}),200);}
    catch(e){console.error("Login error:",e);setTimeout(()=>set({loginErr:true,pinInput:""}),200);}
  }
}

function doAP(id){const f=S.products.find(x=>x.id===id);if(!f)return;
  if(f.grp){if((S.spiritStock[f.grp]||0)<(f.tot||1))return;}
  else if(f.stock!==undefined&&f.stock!==null&&f.stock<=0)return;
  const price=gp(f);const name=f.s?f.n+" ("+f.s+")":f.n;const k=id+(S.mem?"-m":"-n");const ex=S.order.find(i=>i.k===k);set({order:ex?S.order.map(i=>i.k===k?{...i,qty:i.qty+1}:i):[...S.order,{k,n:name,price,qty:1}]});}
function doQ(k,d){set({order:S.order.map(i=>i.k===k?{...i,qty:i.qty+d}:i).filter(i=>i.qty>0)});}
async function doSale(){
  if(!S.order.length)return;const t=tot();
  const sale={vol:S.vol,mem:S.mem,items:S.order.map(i=>({n:i.n,price:i.price,qty:i.qty,pid:i.k.slice(0,-2)})),total:t,pay:S.pay,time:tim(),voided:false};
  try{await saveSale(sale);addLog("💰",S.vol,"Sold R"+t+" ("+S.pay+") — "+S.order.map(i=>i.n+" x"+i.qty).join(", "));
    // Auto-decrement stock (spirits use shared tot pool, others use per-unit stock)
    try{
      const batch=db.batch();
      const spiritDeltas={};
      let hasUpdates=false;
      S.order.forEach(item=>{
        const pid=item.k.slice(0,-2);
        const prod=S.products.find(p=>p.id===pid);
        if(!prod)return;
        if(prod.grp){
          const totsUsed=(prod.tot||1)*item.qty;
          spiritDeltas[prod.grp]=(spiritDeltas[prod.grp]||0)-totsUsed;
          batch.set(db.collection("spiritStock").doc(prod.grp),{tots:firebase.firestore.FieldValue.increment(-totsUsed)},{merge:true});
          hasUpdates=true;
        } else if((prod.stock||0)>0){
          const ns=Math.max(0,(prod.stock||0)-item.qty);
          batch.update(db.collection("products").doc(pid),{stock:ns});
          hasUpdates=true;
        }
      });
      if(hasUpdates){
        await batch.commit();
        const updProds=S.products.map(p=>{
          const oi=S.order.find(i=>i.k.slice(0,-2)===p.id);
          return oi&&!p.grp&&(p.stock||0)>0?{...p,stock:Math.max(0,(p.stock||0)-oi.qty)}:p;
        });
        const newSpiritStock={...S.spiritStock};
        Object.entries(spiritDeltas).forEach(([g,d])=>{newSpiritStock[g]=Math.max(0,(newSpiritStock[g]||0)+d);});
        S.products=updProds;

async function doVoidSale(saleId){
  const sale=S.sales.find(s=>s.id===saleId);if(!sale)return;
  if(!confirm("Void this sale?\nR"+sale.total+" ("+sale.pay+") by "+sale.vol+"\n\nStock will be restored."))return;
  try{
    await voidSaleDb(saleId,S.vol||"admin");addLog("🚫",S.vol||"Admin","Voided sale R"+sale.total+" ("+sale.pay+") by "+sale.vol+" at "+sale.time);
    // Reverse stock
    const batch=db.batch();const spiritDeltas={};
    sale.items.forEach(item=>{
      let prod=item.pid?S.products.find(p=>p.id===item.pid):null;
      if(!prod)prod=S.products.find(p=>(p.s?p.n+" ("+p.s+")":p.n)===item.n);
      if(!prod)return;
      if(prod.grp){const tb=(prod.tot||1)*item.qty;spiritDeltas[prod.grp]=(spiritDeltas[prod.grp]||0)+tb;batch.set(db.collection("spiritStock").doc(prod.grp),{tots:firebase.firestore.FieldValue.increment(tb)},{merge:true});}
      else if(prod.stock!==undefined){batch.update(db.collection("products").doc(prod.id),{stock:firebase.firestore.FieldValue.increment(item.qty)});}
    });
    await batch.commit();
    const ns={...S.spiritStock};Object.entries(spiritDeltas).forEach(([g,d])=>{ns[g]=(ns[g]||0)+d;});
    const np=S.products.map(p=>{const item=sale.items.find(i=>item.pid?i.pid===p.id:(p.s?p.n+" ("+p.s+")":p.n)===i.n);return item&&!p.grp&&p.stock!==undefined?{...p,stock:(p.stock||0)+item.qty}:p;});
    set({sales:S.sales.map(s=>s.id===saleId?{...s,voided:true,voidedBy:S.vol||"admin"}:s),spiritStock:ns,products:np});
  }catch(e){console.error("Void error:",e);alert("Failed to void. Try again.");}
}
async function doUnvoidSale(saleId){

    await unvoidSaleDb(saleId);addLog("↩️",S.vol||"Admin","Un-voided sale R"+sale.total+" by "+sale.vol);
    const batch=db.batch();const spiritDeltas={};
    sale.items.forEach(item=>{

      else if(prod.stock!==undefined){const ns=Math.max(0,(prod.stock||0)-item.qty);batch.update(db.collection("products").doc(prod.id),{stock:ns});}
    });
    await batch.commit();
    const ns={...S.spiritStock};Object.entries(spiritDeltas).forEach(([g,d])=>{ns[g]=Math.max(0,(ns[g]||0)+d);});
    const np=S.products.map(p=>{const item=sale.items.find(i=>item.pid?i.pid===p.id:(p.s?p.n+" ("+p.s+")":p.n)===i.n);return item&&!p.grp&&p.stock!==undefined?{...p,stock:Math.max(0,(p.stock||0)-item.qty)}:p;});
    set({sales:S.sales.map(s=>s.id===saleId?{...s,voided:false,voidedBy:null}:s),spiritStock:ns,products:np});
  }catch(e){console.error("Unvoid error:",e);alert("Failed to un-void. Try again.");}

    var uid="msc-"+date.replace(/\//g,"")+"-"+start.replace(":","")+"@mscbar";
    var summary="MSC Bar Shift"+(label&&label!=="MSC Bar Shift"?" - "+label:"");
    var ics=[
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//Morningside Sports Club//Bar App//EN",
      "CALSCALE:GREGORIAN",
      "METHOD:PUBLISH",
      "BEGIN:VTIMEZONE",
      "TZID:Africa/Johannesburg",
      "BEGIN:STANDARD",
      "TZOFFSETFROM:+0200",
      "TZOFFSETTO:+0200",
      "TZNAME:SAST",
      "DTSTART:19700101T000000",
      "END:STANDARD",
      "END:VTIMEZONE",
      "BEGIN:VEVENT",
      "UID:"+uid,
      "DTSTAMP:"+stamp,
      "DTSTART;TZID=Africa/Johannesburg:"+s1,
      "DTEND;TZID=Africa/Johannesburg:"+e1,
      "SUMMARY:"+summary,
      "DESCRIPTION:Volunteering at Morningside Sports Club Bar",
      "LOCATION:Morningside Sports Club\\, Durban",
      "BEGIN:VALARM",
      "TRIGGER:-PT60M",
      "ACTION:DISPLAY",
      "DESCRIPTION:Reminder: "+summary,
      "END:VALARM",
      "END:VEVENT",
      "END:VCALENDAR"
    ].join("\r\n");
    try{
      var blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");a.href=url;a.download="msc-shift-"+date.replace(/\//g,"-")+".ics";
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(url);},2000);
    }catch(e){
      window.open("data:text/calendar;charset=utf-8,"+encodeURIComponent(ics),"_blank");
    }
  }
};
render();initApp();
</script>
